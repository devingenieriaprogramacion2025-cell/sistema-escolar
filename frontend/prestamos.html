<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestamos | Sistema Escolar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <aside id="sidebar"></aside>
  <main class="main">
    <header id="topbar"></header>

    <section class="page">
      <article class="panel" id="loanFormPanel">
        <h3>Registrar prestamo</h3>
        <form id="loanForm" class="inline-form">
          <div id="requesterField">
            <label for="requesterId">Solicitante (opcional)</label>
            <select id="requesterId">
              <option value="">Usuario actual</option>              
            </select>
          </div>
          <select id="resourceId" required></select>
          <input id="quantity" type="number" min="1" placeholder="Cantidad" required>
          <input id="dueDate" type="date" required>
          <input id="comments" placeholder="Comentario">
          <button type="submit">Enviar prestamo</button>
        </form>
      </article>

      <article class="panel">
        <h3>Listado de prestamos</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Generado por</th>
                <th>Recurso</th>
                <th>Cantidad</th>
                <th>Inicio</th>
                <th>Vencimiento</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="loansTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/prestamos.js"></script>
</body>
</html>
