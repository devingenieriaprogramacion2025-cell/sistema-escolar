<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios | Sistema Escolar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <aside id="sidebar"></aside>
  <main class="main">
    <header id="topbar"></header>

    <section class="page">
      <article class="panel">
        <h3>Crear usuario</h3>
        <form id="createUserForm" class="inline-form">
          <input id="name" placeholder="Nombre completo" required>
          <input id="email" type="email" placeholder="Correo" required>
          <input id="password" type="password" placeholder="Contrasena" required>
          <select id="roleId" required></select>
          <input id="area" placeholder="Area" value="General">
          <input id="phone" placeholder="Telefono">
          <button type="submit">Crear cuenta</button>
        </form>
      </article>

      <article class="panel">
        <h3>Listado de usuarios</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Area</th>
                <th>Estado</th>
                <th>Creado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/usuarios.js"></script>
</body>
</html>
