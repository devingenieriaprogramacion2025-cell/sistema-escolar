<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario | Sistema Escolar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <aside id="sidebar"></aside>
  <main class="main">
    <header id="topbar"></header>

    <section class="page">
      <article class="panel">
        <h3>Filtro de inventario</h3>
        <div class="inline-form">
          <input id="queryText" placeholder="Buscar por codigo, nombre o ubicacion">
          <select id="queryCategoryId"></select>
          <button id="searchResources" type="button">Buscar</button>
        </div>
      </article>

      <article class="panel" id="resourceFormPanel">
        <h3>Registrar recurso</h3>
        <form id="resourceForm" class="inline-form">
          <input id="code" placeholder="Codigo" required>
          <input id="name" placeholder="Nombre" required>
          <select id="categoryId" required></select>
          <input id="area" placeholder="Area" required>
          <input id="location" placeholder="Ubicacion">
          <input id="totalQuantity" type="number" min="0" placeholder="Cantidad total" required>
          <input id="availableQuantity" type="number" min="0" placeholder="Cantidad disponible" required>
          <input id="minStock" type="number" min="0" placeholder="Stock minimo">
          <input id="price" type="number" min="0" placeholder="Costo referencial">
          <textarea id="description" class="full" placeholder="Descripcion"></textarea>
          <button type="submit">Guardar recurso</button>
        </form>
      </article>

      <article class="panel" id="categoryFormPanel">
        <h3>Registrar categoria</h3>
        <form id="categoryForm" class="inline-form">
          <input id="categoryName" placeholder="Nombre categoria" required>
          <input id="categoryDescription" placeholder="Descripcion categoria">
          <button type="submit">Guardar categoria</button>
        </form>
      </article>

      <article class="panel">
        <h3>Listado de recursos</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th>Area</th>
                <th>Stock</th>
                <th>Ubicacion</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="resourcesTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/inventario.js"></script>
</body>
</html>
