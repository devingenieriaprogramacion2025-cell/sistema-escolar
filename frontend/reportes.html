<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes y Auditoria | Sistema Escolar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <aside id="sidebar"></aside>
  <main class="main">
    <header id="topbar"></header>

    <section class="page">
      <article class="panel">
        <h3>Filtros de reporte</h3>
        <div class="inline-form">
          <input id="from" type="date">
          <input id="to" type="date">
          <button id="filterBtn" type="button">Aplicar filtro</button>
          <button id="exportBtn" type="button" class="success">Exportar PDF</button>
        </div>
      </article>

      <div class="metrics">
        <article class="metric"><p>Recursos</p><strong id="reportResources">0</strong></article>
        <article class="metric"><p>Prestamos</p><strong id="reportLoans">0</strong></article>
        <article class="metric"><p>Reservas</p><strong id="reportReservations">0</strong></article>
        <article class="metric"><p>Solicitudes internas</p><strong id="reportRequests">0</strong></article>
        <article class="metric"><p>Solicitudes impresion</p><strong id="reportPrints">0</strong></article>
        <article class="metric"><p>Paginas impresas</p><strong id="reportPages">0</strong></article>
      </div>

      <article class="panel">
        <h3>Top recursos por prestamos</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Codigo</th>
                <th>Recurso</th>
                <th>Cantidad prestada</th>
              </tr>
            </thead>
            <tbody id="topResourcesBody"></tbody>
          </table>
        </div>
      </article>

      <article class="panel" id="auditPanel">
        <h3>Historial de auditoria (Administrador)</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Usuario</th>
                <th>Modulo</th>
                <th>Accion</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="auditTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/reportes.js"></script>
</body>
</html>
