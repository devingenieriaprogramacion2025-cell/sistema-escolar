<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sistema Escolar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <aside id="sidebar"></aside>
  <main class="main">
    <header id="topbar"></header>

    <section class="page">
      <div class="metrics">
        <article class="metric"><p>Total recursos</p><strong id="kpiResources">0</strong></article>
        <article class="metric"><p>Prestamos activos</p><strong id="kpiLoans">0</strong></article>
        <article class="metric"><p>Reservas pendientes</p><strong id="kpiReservations">0</strong></article>
        <article class="metric"><p>Solicitudes pendientes</p><strong id="kpiRequests">0</strong></article>
        <article class="metric"><p>Impresiones pendientes</p><strong id="kpiPrints">0</strong></article>
      </div>

      <div class="grid cols-3">
        <article class="panel">
          <h3>Prestamos por estado</h3>
          <div id="loanStatusChart"></div>
        </article>
        <article class="panel">
          <h3>Reservas por estado</h3>
          <div id="reservationStatusChart"></div>
        </article>
        <article class="panel">
          <h3>Recursos por categoria</h3>
          <div id="resourceCategoryChart"></div>
        </article>
      </div>

      <div class="grid cols-2">
        <article class="panel">
          <h3>Alertas de stock</h3>
          <ul id="lowStockList"></ul>
        </article>
        <article class="panel">
          <h3>Prestamos vencidos</h3>
          <ul id="overdueList"></ul>
        </article>
      </div>
    </section>
  </main>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/dashboard.js"></script>
</body>
</html>
