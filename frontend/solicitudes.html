<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitudes | Sistema Escolar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <aside id="sidebar"></aside>
  <main class="main">
    <header id="topbar"></header>

    <section class="page">
      <article class="panel" id="requestFormPanel">
        <h3>Nueva solicitud interna</h3>
        <form id="requestForm" class="inline-form">
          <input id="title" placeholder="Titulo" required>
          <select id="priority">
            <option value="LOW">Baja</option>
            <option value="MEDIUM" selected>Media</option>
            <option value="HIGH">Alta</option>
            <option value="URGENT">Urgente</option>
          </select>
          <textarea id="description" class="full" placeholder="Detalle" required></textarea>
          <button type="submit">Crear solicitud</button>
        </form>
      </article>

      <article class="panel">
        <h3>Listado de solicitudes</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Solicitante</th>
                <th>Titulo</th>
                <th>Prioridad</th>
                <th>Estado</th>
                <th>Comentario</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="requestsTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/solicitudes.js"></script>
</body>
</html>
